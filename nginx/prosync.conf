# Configuração ProSync para Nginx
# Copie este arquivo para: /workspace/drop/nginx/conf.d/prosync.conf

# Redirecionar HTTP para HTTPS
server {
    listen 80;
    server_name monitor.geekdistribuidora.com.br;
    return 301 https://$server_name$request_uri;
}

# Configuração HTTPS
server {
    listen 443 ssl http2;
    server_name monitor.geekdistribuidora.com.br;

    # Certificados SSL (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/monitor.geekdistribuidora.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/monitor.geekdistribuidora.com.br/privkey.pem;

    # Configurações SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Logs específicos do ProSync
    access_log /var/log/nginx/monitor_access.log;
    error_log /var/log/nginx/monitor_error.log;

    # Proxy para a aplicação Go (container prosync na porta 8080)
    location / {
        proxy_pass http://prosync:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeout para requisições longas
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Cache para arquivos estáticos
    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        proxy_pass http://prosync:8080;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Location para validação do certbot (Let's Encrypt)
    location ~ /.well-known/acme-challenge {
        allow all;
        root /var/www/html;
    }
}
