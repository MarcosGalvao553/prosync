# Use esta configuração inicialmente, antes de configurar o SSL
server {
    listen 80;
    server_name monitor.nerdrop.com.br;

    # Logs
    access_log /var/log/nginx/monitor_access.log;
    error_log /var/log/nginx/monitor_error.log;

    # Proxy para a aplicação Go
    location / {
        proxy_pass http://prosync:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeout para requisições longas
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Cache para arquivos estáticos
    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        proxy_pass http://prosync:8000;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Location para validação do certbot
    location ~ /.well-known/acme-challenge {
        allow all;
        root /var/www/html;
    }
}
